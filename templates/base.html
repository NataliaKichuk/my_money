{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'styles/mystyles.css' %}"/>

</head>

<body>
<nav class="dashboard">
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'record_list' %}">Incomes and expenses</a>
    <a href="{% url 'categories_list' %}">Categories</a>
</nav>

<div id="content" style="width: 70%; float: left; padding: 0 0 0 30px">
    {% block content %}{% endblock %}
</div>

<div id="sidebar" style="width:20%; float: right; height: 100%; padding: 10px; background: #efefef">
    <h3>My money</h3>
    <hr>
    {% if user.is_authenticated %}
        Hi {{ user.username }}!
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <a href="#" onclick="parentNode.submit();">Log Out</a>
        </form>
    {% else %}
        <p>You are not logged in</p>
        <a href="{% url 'login' %}">Log In</a>
    {% endif %}
    <hr>
</div>

</body>
</html>
