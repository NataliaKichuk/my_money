{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'styles/mystyles.css' %}"/>

</head>

<body>
<nav class="dashboard">
    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'record_list' %}">Incomes and expenses</a>
        <a href="{% url 'categories_list' %}">Categories</a>
    </div>

    <div class="auth-links">
        {% if user.is_authenticated %}
            <span>Hi {{ user.username }}!</span>
            <form action="{% url 'logout' %}" method="post">
                 {% csrf_token %}
                <a href="#" onclick="parentNode.submit();">Log Out</a>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Log In</a>
            <a href="{% url 'signup' %}">Sign Up</a>
        {% endif %}
    </div>

</nav>

<div id="content" style="width: 70%; float: left; padding: 0 0 0 30px">
    {% block content %}{% endblock %}
</div>

</body>
</html>
