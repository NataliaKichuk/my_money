{% extends '../base.html' %}

{% block content %}

<h3>Are you sure you want to delete this category?</h3>
<p>{{ category.name }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Delete</button>
    <a href="{% url 'categories_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
