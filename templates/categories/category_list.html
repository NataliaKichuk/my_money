{% extends '../base.html' %}

{% block content %}

<h2 style="color: mediumseagreen; font-family: 'Montserrat'">Categories</h2>
<a class="create-btn" href="{% url 'category_create' %}">Add Category</a>
<table style="width:100%; border-collapse: collapse; border-style: groove;">
    <tr>
        <th style="width:30%">Name</th>
        <th style="width:10%">Type</th>
        <th style="width:40%">Description</th>
        <th style="width:20%">Actions</th>
    </tr>

    {% for obj in objects %}
    <tr>
       <td class="td-longstring">{{ obj.name }}</td>
       <td>{{ obj.get_category_type_display }}</td>
       <td class="td-longstring" style="">{{ obj.description }}</td>
       <td class="actions-cell">
           <a class="action-btn" href="{% url 'category_edit' obj.id %}">Edit</a>
           <a class="action-btn" href="{% url 'category_delete' obj.id %}">Delete</a>
       </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
